<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5c2e7;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#cba6f7;stop-opacity:0.3" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5c2e7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#cba6f7;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background blob -->
  <ellipse cx="200" cy="150" rx="160" ry="120" fill="url(#grad1)" />
  <!-- Book/journal -->
  <rect x="130" y="80" width="140" height="160" rx="8" fill="#313244" stroke="#45475a" stroke-width="2"/>
  <rect x="138" y="88" width="124" height="144" rx="4" fill="#1e1e2e"/>
  <!-- Lines (text) -->
  <rect x="155" y="108" width="90" height="4" rx="2" fill="#585b70"/>
  <rect x="155" y="120" width="70" height="4" rx="2" fill="#585b70"/>
  <rect x="155" y="132" width="80" height="4" rx="2" fill="#585b70"/>
  <rect x="155" y="148" width="75" height="4" rx="2" fill="#45475a"/>
  <rect x="155" y="160" width="90" height="4" rx="2" fill="#45475a"/>
  <rect x="155" y="172" width="60" height="4" rx="2" fill="#45475a"/>
  <!-- Sparkle -->
  <circle cx="280" cy="100" r="3" fill="#f5c2e7">
    <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="120" cy="130" r="2" fill="#cba6f7">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="300" cy="180" r="2.5" fill="#e8a2af">
    <animate attributeName="opacity" values="1;0.4;1" dur="1.8s" repeatCount="indefinite"/>
  </circle>
  <!-- Pen -->
  <g transform="translate(255, 135) rotate(35)">
    <rect x="0" y="0" width="6" height="55" rx="2" fill="url(#grad2)"/>
    <polygon points="0,55 6,55 3,65" fill="#e8a2af"/>
  </g>
  <!-- Heart -->
  <path d="M195 205 C195 200, 188 195, 185 200 C182 205, 188 212, 195 218 C202 212, 208 205, 205 200 C202 195, 195 200, 195 205Z" fill="#f5c2e7" opacity="0.7">
    <animate attributeName="opacity" values="0.7;1;0.7" dur="3s" repeatCount="indefinite"/>
  </path>
</svg>
